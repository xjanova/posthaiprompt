name: Android · Build & Release APK

# Triggers:
#  - push tag like v1.2.3       → build signed release APK + create GitHub Release (auto-updater consumes this)
#  - manual workflow_dispatch    → build APK without releasing (for testing)
#  - PR to main affecting flutter_android → build APK + upload as artifact (smoke test, no release)
on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'flutter_android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release (only meaningful from a tag commit)'
        type: boolean
        default: false

permissions:
  contents: write   # required to create releases

defaults:
  run:
    working-directory: flutter_android

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Get dependencies
        run: flutter pub get

      - name: Verify analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Decode keystore
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          ls -la android/app/upload-keystore.jks

      - name: Write key.properties
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_PASSWORD:   ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK (release)
        run: |
          flutter build apk --release --build-name=${GITHUB_REF_NAME#v} --build-number=${GITHUB_RUN_NUMBER}

      - name: Rename APK
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk \
             out/posthaiprompt-${GITHUB_REF_NAME:-dev}.apk
          ls -la out/

      - name: Upload artifact (every run)
        uses: actions/upload-artifact@v4
        with:
          name: posthaiprompt-apk-${{ github.ref_name || github.sha }}
          path: flutter_android/out/*.apk
          retention-days: 30

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: flutter_android/out/*.apk
          body: |
            **Thaiprompt POS — Android**

            Built by GitHub Actions on ${{ github.sha }}.

            ## Install
            1. Download `posthaiprompt-${{ github.ref_name }}.apk`
            2. Open on your Android device
            3. Allow "Install from unknown sources" if prompted

            ## Auto-update
            Existing users see an update banner inside the app once this release is published.
            Same signing key = clean overwrite, user data preserved.

            ---
            Built with ❤ by xman studio
